services:
  web:
    image: nginx:alpine
    container_name: hansung-info-static
    restart: unless-stopped
    ports:
      - "8282:80"
    # Serve the *published* HTML directory (generated by --publish)
    # Default publish dir is: ~/docker_volumes/hansung-info-static/html
    volumes:
      - ${HOME}/docker_volumes/hansung-info-static/html:/usr/share/nginx/html:ro
